name: Release on tag

# 태그 push → release 환경 승인 후 GitHub Release 생성
# 외부 actions(uses) 미사용 → Actions allowlist에 서드파티 액션 등록 불필요

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          args=(release create "$TAG" --title "$TAG" --generate-notes)
          if [[ "$TAG" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh "${args[@]}"
